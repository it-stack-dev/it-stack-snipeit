# =============================================================================
# IT-Stack: Snipe-IT — Lab 06: Production Deployment
# Module 16 · Phase 4 · Lab 06
# =============================================================================
# Services: MariaDB · Redis · OpenLDAP · Keycloak · Mailhog · Snipe-IT · Queue Worker
# Ports:    App:8461  KC:8561  LDAP:3872  MH:8751
# Credentials:
#   DB root: RootProd06!  app: snipeit / SnipeProd06!
#   Keycloak: admin / Admin06!
#   LDAP:     cn=admin,dc=lab,dc=local / LdapProd06!
# Production features vs Lab 05:
#   + restart: unless-stopped on ALL services
#   + Resource limits AND reservations on every service
#   + Dedicated queue-worker container (php artisan queue:work)
#   + Redis for cache, sessions, and job queue
#   + IT_STACK_ENV: production  IT_STACK_LAB: "06" labels
# =============================================================================

name: it-stack-snipeit-lab06

services:

  # ── MariaDB ────────────────────────────────────────────────────────────────
  snipeit-p06-db:
    image: mariadb:10.11
    container_name: snipeit-p06-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootProd06!
      MYSQL_DATABASE: snipeit
      MYSQL_USER: snipeit
      MYSQL_PASSWORD: SnipeProd06!
    volumes:
      - snipeit-p06-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-pRootProd06!", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - snipeit-p06-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Redis ───────────────────────────────────────────────────────────────────
  snipeit-p06-redis:
    image: redis:7-alpine
    container_name: snipeit-p06-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - snipeit-p06-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - snipeit-p06-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── OpenLDAP ───────────────────────────────────────────────────────────────
  snipeit-p06-ldap:
    image: osixia/openldap:1.5.0
    container_name: snipeit-p06-ldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "IT-Stack Production"
      LDAP_DOMAIN: lab.local
      LDAP_ADMIN_PASSWORD: LdapProd06!
      LDAP_CONFIG_PASSWORD: ConfigProd06!
      LDAP_BASE_DN: dc=lab,dc=local
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: readonly
      LDAP_READONLY_USER_PASSWORD: ReadOnlyProd06!
    ports:
      - "3872:389"
    volumes:
      - snipeit-p06-ldap-data:/var/lib/ldap
      - snipeit-p06-ldap-config:/etc/ldap/slapd.d
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -b dc=lab,dc=local -D cn=admin,dc=lab,dc=local -w LdapProd06! cn=admin > /dev/null 2>&1 && echo ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - snipeit-p06-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Keycloak ───────────────────────────────────────────────────────────────
  snipeit-p06-kc:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: snipeit-p06-kc
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Admin06!
      KC_HEALTH_ENABLED: "true"
      KC_DB: dev-file
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8561:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - snipeit-p06-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Mailhog ────────────────────────────────────────────────────────────────
  snipeit-p06-mail:
    image: mailhog/mailhog:latest
    container_name: snipeit-p06-mail
    restart: unless-stopped
    ports:
      - "8751:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v2/messages || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - snipeit-p06-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── Snipe-IT App ──────────────────────────────────────────────────────────
  snipeit-p06-app:
    image: snipe/snipe-it:latest
    container_name: snipeit-p06-app
    restart: unless-stopped
    depends_on:
      snipeit-p06-db:
        condition: service_healthy
      snipeit-p06-redis:
        condition: service_healthy
      snipeit-p06-ldap:
        condition: service_healthy
      snipeit-p06-kc:
        condition: service_healthy
    ports:
      - "8461:80"
    environment:
      IT_STACK_ENV: production
      IT_STACK_MODULE: snipeit
      IT_STACK_LAB: "06"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:SnipeItProd06KeyABCDEFGHIJKLMN=
      APP_URL: http://localhost:8461
      DB_CONNECTION: mysql
      DB_HOST: snipeit-p06-db
      DB_PORT: "3306"
      DB_DATABASE: snipeit
      DB_USERNAME: snipeit
      DB_PASSWORD: SnipeProd06!
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_DRIVER: redis
      REDIS_HOST: snipeit-p06-redis
      REDIS_PORT: "6379"
      MAIL_DRIVER: smtp
      MAIL_HOST: snipeit-p06-mail
      MAIL_PORT: "1025"
      MAIL_FROM_ADDR: snipe@lab.local
      LDAP_ENABLED: "true"
      LDAP_SERVER: ldap://snipeit-p06-ldap
      LDAP_PORT: "389"
      LDAP_BASEDN: dc=lab,dc=local
      LDAP_BINDDN: cn=admin,dc=lab,dc=local
      LDAP_BINDPW: LdapProd06!
      KEYCLOAK_URL: http://snipeit-p06-kc:8080
      KEYCLOAK_REALM: it-stack
      KEYCLOAK_CLIENT_ID: snipeit
      KEYCLOAK_CLIENT_SECRET: snipeit-prod-secret-06
      ODOO_URL: http://odoo.lab.local:8069
      ODOO_DB: odoo
      ODOO_USER: admin
      ODOO_API_KEY: prod-odoo-key-06
      ODOO_ASSET_MODEL: stock.inventory
    volumes:
      - snipeit-p06-data:/var/lib/snipeit
      - snipeit-p06-logs:/var/log/snipeit
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - snipeit-p06-net
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Snipe-IT Queue Worker ──────────────────────────────────────────────────
  snipeit-p06-queue:
    image: snipe/snipe-it:latest
    container_name: snipeit-p06-queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    depends_on:
      snipeit-p06-app:
        condition: service_healthy
    environment:
      IT_STACK_ENV: production
      IT_STACK_MODULE: snipeit
      IT_STACK_LAB: "06"
      APP_ENV: production
      APP_KEY: base64:SnipeItProd06KeyABCDEFGHIJKLMN=
      DB_CONNECTION: mysql
      DB_HOST: snipeit-p06-db
      DB_PORT: "3306"
      DB_DATABASE: snipeit
      DB_USERNAME: snipeit
      DB_PASSWORD: SnipeProd06!
      CACHE_DRIVER: redis
      QUEUE_DRIVER: redis
      REDIS_HOST: snipeit-p06-redis
      REDIS_PORT: "6379"
    volumes:
      - snipeit-p06-data:/var/lib/snipeit
    networks:
      - snipeit-p06-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  snipeit-p06-net:
    name: snipeit-p06-net
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  snipeit-p06-db-data:
  snipeit-p06-redis-data:
  snipeit-p06-ldap-data:
  snipeit-p06-ldap-config:
  snipeit-p06-data:
  snipeit-p06-logs:
